services:
  # ============================================
  # 基础设施服务
  # ============================================

  postgres:
    image: postgres:15.7-alpine
    container_name: kb-postgres
    environment:
      POSTGRES_DB: multi_agent_platform
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user -d multi_agent_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  redis:
    image: redis:7.2.5-alpine
    container_name: kb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: kb-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=${ES_PASSWORD:?ES_PASSWORD is required}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - cluster.name=knowledge-base-cluster
      - node.name=kb-node-1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:$${ELASTIC_PASSWORD} -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - kb-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: kb-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_MAX_SESSION_TIMEOUT: 60000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kb-network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kb-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENER_NAMES: PLAINTEXT,PLAINTEXT_HOST
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - kb-network

  # ============================================
  # 后端服务
  # ============================================

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    container_name: kb-api-gateway
    working_dir: /app
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_SERVICE_URL=http://auth-api:8083
      - CODE_INTELLIGENCE_SERVICE_URL=http://code-intelligence-api:8081
      - KNOWLEDGE_MENTOR_SERVICE_URL=http://knowledge-mentor-api:8080
    ports:
      - "8082:8082"
    networks:
      - kb-network
    depends_on:
      - redis

  auth-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.auth
    container_name: kb-auth-api
    working_dir: /app
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/multi_agent_platform
      - SPRING_DATASOURCE_USERNAME=kb_user
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "8083:8083"
    networks:
      - kb-network
    depends_on:
      - postgres
      - redis

  knowledge-mentor-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.knowledge-mentor
    container_name: kb-knowledge-mentor-api
    working_dir: /app
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/multi_agent_platform
      - SPRING_DATASOURCE_USERNAME=kb_user
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ES_PASSWORD:?ES_PASSWORD is required}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "8080:8080"
    networks:
      - kb-network
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - kafka

  code-intelligence-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.code-intelligence
    container_name: kb-code-intelligence-api
    working_dir: /app
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SERVER_PORT=8081
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/multi_agent_platform
      - SPRING_DATASOURCE_USERNAME=kb_user
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - QWEN_API_KEY=${QWEN_API_KEY:?QWEN_API_KEY is required}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "8081:8081"
    networks:
      - kb-network
    depends_on:
      - postgres
      - redis

  prometheus:
    image: prom/prometheus:latest
    container_name: kb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - kb-network

  minio:
    image: minio/minio:latest
    container_name: kb-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - kb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: kb-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - kb-network

volumes:
  postgres_data:
    driver: local
  es_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  kafka_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  minio_data:
    driver: local

networks:
  kb-network:
    driver: bridge
