# ============================================
# 低资源服务器 Docker Compose 配置
# 适用: 2核2G服务器
# ============================================

version: '3.8'

services:
  # ============================================
  # 基础设施服务
  # ============================================

  # PostgreSQL - 内存限制 200MB
  postgres:
    image: postgres:15.7-alpine
    container_name: kb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multi_agent_platform
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create_tables.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "effective_cache_size=128MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "max_connections=50"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # Redis - 内存限制 100MB
  redis:
    image: redis:7.2-alpine
    container_name: kb-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - backend

  # Kafka - 内存限制 150MB
  kafka:
    image: bitnami/kafka:3.6
    container_name: kb-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_BROKER_ID: 1
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
      KAFKA_CFG_LOG_SEGMENT_BYTES: 536870912
      KAFKA_CFG_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 2
      KAFKA_CFG_LOG_DIRS: /kafka/logs
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_HEAP_OPTS: -Xmx128M -Xms64M
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 200M
        reservations:
          cpus: '0.2'
          memory: 100M
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend

  # Zookeeper - Kafka 依赖，内存限制 80MB
  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: kb-zookeeper
    restart: unless-stopped
    environment:
      ZOO_SERVER_ID: 1
      ZOO_PORT_NUMBER: 2181
      ZOO_TICK_TIME: 2000
      ZOO_INIT_LIMIT: 10
      ZOO_SYNC_LIMIT: 5
      ZOO_MAX_CLIENT_CNXNS: 60
      ALLOW_ANONYMOUS_LOGIN: "yes"
      JVM_OPTS: -Xmx64M -Xms32M
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    ports:
      - "2181:2181"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 96M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "nc -zv localhost 2181 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - backend

  # Elasticsearch - 内存限制 300MB
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: kb-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      xpack.monitoring.collection.enabled: "false"
      action.destructive_requires_name: "true"
      indices.query.bool.max_clause_count: 2048
      index.max_result_window: 10000
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 350M
        reservations:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend

  # ============================================
  # 应用服务
  # ============================================

  # API Gateway - 内存限制 256MB
  api-gateway:
    image: think-platform/api-gateway:latest
    container_name: kb-api-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: >
        -Xms128m
        -Xmx256m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/var/log/app/
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8083
      KNOWLEDGE_MENTOR_SERVICE_URL: http://knowledge-mentor:8080
      CODE_INTELLIGENCE_SERVICE_URL: http://code-intelligence:8088
    volumes:
      - ./logs:/var/log/app
    ports:
      - "8082:8082"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend

  # Auth Service - 内存限制 256MB
  auth-service:
    image: think-platform/auth-service:latest
    container_name: kb-auth-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: >
        -Xms128m
        -Xmx256m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/multi_agent_platform
      SPRING_DATASOURCE_USERNAME: kb_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./logs:/var/log/app
    ports:
      - "8083:8083"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend

  # Knowledge Mentor Service - 内存限制 384MB
  knowledge-mentor:
    image: think-platform/knowledge-mentor:latest
    container_name: kb-knowledge-mentor
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: >
        -Xms192m
        -Xmx384m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/multi_agent_platform
      SPRING_DATASOURCE_USERNAME: kb_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QWEN_API_KEY: ${QWEN_API_KEY}
    volumes:
      - ./logs:/var/log/app
      - ./uploads:/var/data/uploads
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 450M
        reservations:
          cpus: '0.3'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend

  # Code Intelligence Service - 内存限制 256MB
  code-intelligence:
    image: think-platform/code-intelligence:latest
    container_name: kb-code-intelligence
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: >
        -Xms128m
        -Xmx256m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/multi_agent_platform
      SPRING_DATASOURCE_USERNAME: kb_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QWEN_API_KEY: ${QWEN_API_KEY}
    volumes:
      - ./logs:/var/log/app
      - ./projects:/var/data/projects
    ports:
      - "8088:8088"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
        reservations:
          cpus: '0.2'
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend

  # ============================================
  # 前端服务
  # ============================================

  # Nginx 前端 - 内存限制 64MB
  frontend:
    image: think-platform/frontend:latest
    container_name: kb-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 80M
        reservations:
          cpus: '0.1'
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - backend

# ============================================
# 数据卷
# ============================================

volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  es_data:
    driver: local

# ============================================
# 网络
# ============================================

networks:
  backend:
    driver: bridge
