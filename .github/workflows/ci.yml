name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15.7-alpine
        env:
          POSTGRES_DB: multi_agent_platform
          POSTGRES_USER: kb_user
          POSTGRES_PASSWORD: kb_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kb_user -d multi_agent_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2.5-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ci-test-secret-must-be-at-least-32-bytes
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/multi_agent_platform
      SPRING_DATASOURCE_USERNAME: kb_user
      SPRING_DATASOURCE_PASSWORD: kb_password
      REDIS_HOST: localhost
      QWEN_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven package
        run: mvn -B -f backend/pom.xml -DskipTests package

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
