server:
  port: 8083

spring:
  application:
    name: auth-service
  profiles:
    active: auth-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/multi_agent_platform}
    username: ${SPRING_DATASOURCE_USERNAME:kb_user}
    password: ${SPRING_DATASOURCE_PASSWORD:kb_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:60000ms}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

#  mail:
#    host: smtp.example.com
#    port: 587
#    username: your-email@example.com
#    password: your-password
#    properties:
#      mail:
#        smtp:
#          auth: true
#          starttls:
#            enable: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days (in milliseconds)

# Auth Service Configuration
auth:
  password:
    reset-token-expiry-hours: 24
  refresh-token-expiry-days: 7

# Logging
logging:
  level:
    com.codereview.auth: DEBUG
    com.think.platform.shared.security: DEBUG
    org.springframework.security: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'

# Actuator & Monitoring Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 30s
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      sla:
        http.server.requests: 100ms, 500ms, 1s, 2s
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:default}
    enable:
      jvm: true
      process: true
      system: true
      logback: true
      tomcat: true
      spring: true

# Knife4j API Documentation Configuration
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false # 生产环境关闭
  cors: false # 禁用 Knife4j 跨域（由 Gateway 处理）
