server:
  port: 8088

spring:
  application:
    name: codereview-ai

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/multi_agent_platform}
    username: ${SPRING_DATASOURCE_USERNAME:kb_user}
    password: ${SPRING_DATASOURCE_PASSWORD:kb_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history_codereview

  jpa:
    hibernate:
      ddl-auto: none
      show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 1MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 30000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      group-id: codereview-group
      auto-offset-reset: earliest
      # Increase timeout for long-running AI analysis (30 minutes)
      max-poll-interval-ms: 1800000
      # Process only 1 message at a time to avoid timeout
      max-poll-records: 1
      # Enable manual immediate commit after processing
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      # Manual acknowledgment mode
      ack-mode: manualimmediate

# Qwen AI Configuration
qwen:
  api-key: ${QWEN_API_KEY:sk-placeholder-key-please-set-env-var}
  api-url: ${QWEN_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  chat-model: ${QWEN_CHAT_MODEL:qwen-turbo}
  max-tokens: ${QWEN_MAX_TOKENS:8000}
  temperature: ${QWEN_TEMPERATURE:0.7}
  # Rate limiting to prevent 429 errors
  max-concurrent-requests: ${QWEN_MAX_CONCURRENT:2}
  # Retry configuration
  retry-max-attempts: ${QWEN_RETRY_MAX:3}
  retry-initial-delay: ${QWEN_RETRY_DELAY:2000}

# ReAct Agent Configuration
react:
  enabled: ${REACT_ENABLED:true}
  max-lines-for-react: ${REACT_MAX_LINES:100}
  max-iterations: ${REACT_MAX_ITERATIONS:10}
  timeout-seconds: ${REACT_TIMEOUT:120}
  # Tool configuration
  tools:
    sql_injection_analyzer:
      enabled: ${TOOL_SQL_INJECTION:true}
      priority: 10
    xss_scanner:
      enabled: ${TOOL_XSS_SCANNER:true}
      priority: 20
    dependency_checker:
      enabled: ${TOOL_DEPENDENCY_CHECKER:true}
      priority: 30
  # Strategy configuration
  strategy:
    # Use free tools before LLM calls
    free-tools-first: ${REACT_FREE_TOOLS_FIRST:true}
    # Maximum tool calls per iteration
    max-tools-per-iteration: ${REACT_MAX_TOOLS_PER_ITERATION:3}

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  project-bucket-name: ${MINIO_PROJECT_BUCKET:code-review-projects}
  part-size: ${MINIO_PART_SIZE:5242880}

# Kafka Topics
kafka:
  topic:
    code-review: code-review-processing

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:7xC6H4acpIyLKfg1yKZzZZlbOrrbFhEQGIqh8kYhRfxtX+f7xWGyFcGyRjsfUVGHVm/dgysYInm33Bmidfc1mw==}
  expiration: ${JWT_EXPIRATION:86400000}

# Logging
logging:
  level:
    com.think.platform.ci: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

# Teaching System Configuration
teaching:
  enabled: true
  # Achievement auto-unlock settings
  achievements:
    auto-check: true
    events:
      - review_completed
      - lesson_completed
      - exercise_passed
  # Skill assessment settings
  skill-assessment:
    enabled: true
    auto-update: true
  # Exercise validation settings
  exercises:
    timeout-seconds: 30
    max-code-length: 10000
  # Content recommendation settings
  recommendations:
    max-results: 10
    include-unpublished: false

# Project Upload Configuration
project:
  # File filter configuration
  file-filter:
    included-extensions:
      - .java
      - .py
      - .js
      - .ts
      - .jsx
      - .tsx
      - .go
      - .rs
      - .c
      - .cpp
      - .h
      - .cs
      - .php
      - .rb
      - .swift
      - .kt
      - .scala
      - .vue
      - .svelte
      - .astro
    excluded-directories:
      - node_modules
      - .git
      - vendor
      - build
      - dist
      - target
      - out
      - bin
      - .gradle
      - .idea
      - .vscode
      - coverage
      - __pycache__
      - .next
      - .nuxt
      - venv
      - env
      - .venv
    excluded-patterns:
      - "*.min.js"
      - "*.min.css"
      - "*.bundle.js"
      - "*.bundle.css"
      - "*.chunk.js"
      - "*.chunk.css"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - "*.pyc"
      - "*.pyo"
      - "*.class"
      - "*.jar"
    max-file-size-bytes: 10485760  # 10MB
    max-lines-per-file: 5000
    min-file-size-bytes: 10
  # Analysis configuration
  analysis:
    max-concurrent-files: 5
    batch-size: 10
    timeout-minutes: 30
  # Kafka topic for project processing
  kafka:
    topic: project-analysis

# Knife4j API Documentation Configuration
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false # 生产环境关闭
  cors: false # 禁用 Knife4j 跨域 - 由 API Gateway 处理
# AI Configuration
ai:
  enabled: true

