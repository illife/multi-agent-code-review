server:
  port: 8082

spring:
  # File upload configuration for project ZIP files
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 1MB
  application:
    name: api-gateway

  # Cloud Gateway Configuration
  cloud:
    gateway:
      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://localhost:5174
              - http://localhost:5175
              - http://localhost:5176
              - http://localhost:5177
              - http://localhost:3000
              - http://localhost:3001
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
              - HEAD
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # Default filters
      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
            methods: GET,POST
            backoff:
              firstBackoff: 10ms
              maxBackoff: 50ms
              factor: 2
              basedOnPreviousValue: false

      # Discovery locator (for service discovery)
      discovery:
        locator:
          enabled: false  # We use static service instances
          lower-case-service-id: true

  # Redis configuration for rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Service endpoints configuration
services:
  endpoints:
    auth-service:
      url: ${AUTH_SERVICE_URL:http://localhost:8083}
    code-intelligence-service:
      url: ${CODE_INTELLIGENCE_SERVICE_URL:http://localhost:8088}
    knowledge-mentor-service:
      url: ${KNOWLEDGE_MENTOR_SERVICE_URL:http://localhost:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:7xC6H4acpIyLKfg1yKZzZZlbOrrbFhEQGIqh8kYhRfxtX+f7xWGyFcGyRjsfUVGHVm/dgysYInm33Bmidfc1mw==}
  expiration: ${JWT_EXPIRATION:86400000}

# Knife4j Configuration
knife4j:
  enable: ${KNIFE4J_ENABLE:true}
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false  # 生产环境关闭
  cors: true

# SpringDoc Configuration (for OpenAPI aggregation)
springdoc:
  api-docs:
    enabled: true
    version: openapi_3_1
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - url: /v3/api-docs/auth-service
        name: 认证服务
        display-name: Auth Service
      - url: /v3/api-docs/code-intelligence-service
        name: 代码智能服务
        display-name: Code Intelligence Service
      - url: /v3/api-docs/knowledge-mentor-service
        name: 知识库服务
        display-name: Knowledge Mentor Service
  group-configs:
    - group: auth-service
      paths-to-match: /api/auth/**, /api/users/**
    - group: code-intelligence-service
      paths-to-match: /api/agent/**, /api/learning/**, /api/projects/**, /api/review/**, /api/analysis/**
    - group: knowledge-mentor-service
      paths-to-match: /api/documents/**, /api/qa/**, /api/search/**, /api/lessons/**, /api/exercises/**

# Logging Configuration
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.think.platform.gateway: ${LOGGING_LEVEL_GATEWAY:DEBUG}
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
