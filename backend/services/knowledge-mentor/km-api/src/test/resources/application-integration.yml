# Integration Test Configuration
# 真实调用外部服务和AI模型

spring:
  # 使用真实的PostgreSQL数据库
  datasource:
    url: jdbc:postgresql://localhost:5432/multi_agent_platform
    username: kb_user
    password: ${DB_PASSWORD:kb_password}
    driver-class-name: org.postgresql.Driver

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # 真实Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 14  # 使用独立的测试数据库

# 日志配置
logging:
  level:
    root: INFO
    com.think.platform.km: DEBUG
    org.springframework.kafka: INFO
    io.minio: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 真实的外部服务
elasticsearch:
  uris: http://localhost:9200

kafka:
  bootstrap-servers: localhost:9092

# 真实AI模型调用
qwen:
  api-key: ${QWEN_API_KEY:test-placeholder-key}
  api-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  embedding-model: text-embedding-v4
  chat-model: qwen-plus

# 真实MinIO
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: test-integration-uploads
  part-size: 5242880
